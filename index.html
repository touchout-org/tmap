<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DotTMAP — Tactile Street Maps for the Dot Pad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <p id="browser-warning" role="alert" hidden>This App works best in Chrome. Please switch to Chrome so you can connect to the Dot Pad.</p>

  <h1>Welcome to DotTMAP</h1>

  <form id="search-form">
    <label for="location-input" id="location-label">Enter an address or location to get started:</label>
    <input type="text" id="location-input" name="location" autocomplete="off">
    <button type="submit" id="btn-search">Search</button>
  </form>

  <div id="anchor-row">
    <h2 id="anchor-heading" hidden></h2>
    <label for="scale-select">Scale</label>
    <select id="scale-select" disabled></select>
  </div>

  <div id="map-row">
    <div id="map-container">
      <svg id="map" viewBox="0 0 600 400" role="img" aria-label="Street map"></svg>
    </div>
    <div id="move-map" role="group" aria-label="Move Map">
      <button id="btn-pan-north" type="button" disabled>North</button>
      <button id="btn-pan-west" type="button" disabled>West</button>
      <button id="btn-pan-east" type="button" disabled>East</button>
      <button id="btn-pan-south" type="button" disabled>South</button>
    </div>
  </div>

  <div id="message-display" role="alert" aria-live="assertive"></div>

  <hr>
  <h3>Controls</h3>
  <div id="controls-row">
    <button id="btn-connect" type="button">Connect Dot Pad</button>
    <button id="btn-disconnect" type="button" hidden>Disconnect Dot Pad</button>
    <button id="btn-labels" type="button">Braille Labels...</button>
  </div>

  <p id="device-info"></p>

  <dialog id="labels-dialog" aria-labelledby="labels-dialog-heading">
    <h3 id="labels-dialog-heading">Braille Labels</h3>
    <p>Choose which edges of the display show braille street labels.</p>
    <div>
      <input type="checkbox" id="label-top">
      <label for="label-top">Top</label>
    </div>
    <div>
      <input type="checkbox" id="label-bottom">
      <label for="label-bottom">Bottom</label>
    </div>
    <div>
      <input type="checkbox" id="label-left">
      <label for="label-left">Left</label>
    </div>
    <div>
      <input type="checkbox" id="label-right">
      <label for="label-right">Right</label>
    </div>
    <button id="btn-labels-close" type="button">Close</button>
  </dialog>

  <hr>
  <fieldset id="tuning-fields">
    <legend>Experimental tuning (developer use only)</legend>
    <div>
      <label for="tuning-density-cell-size">Density cell size (display pixels)</label>
      <input type="number" id="tuning-density-cell-size" min="1" step="1" value="20">
    </div>
    <div>
      <label for="tuning-density-threshold">Density threshold (streets per cell)</label>
      <input type="number" id="tuning-density-threshold" min="1" step="1" value="2">
    </div>
    <div>
      <label for="tuning-carriageway-max-separation">Carriageway max separation (feet)</label>
      <input type="number" id="tuning-carriageway-max-separation" min="1" step="1" value="200">
    </div>
  </fieldset>

  <footer>
    <p id="build-id">Build: __BUILD_TIME__</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
