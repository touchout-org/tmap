<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OSM Data Mine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="view-menu-container">
  <button type="button" id="view-menu-button" aria-haspopup="true" aria-expanded="false" aria-controls="view-menu">
    Data view
  </button>
  <ul id="view-menu" role="menu" aria-labelledby="view-menu-button" hidden>
    <li role="none"><button type="button" role="menuitem" tabindex="-1" data-view="overview">Overview</button></li>
    <li role="none"><button type="button" role="menuitem" tabindex="-1" data-view="highway">Highway</button></li>
    <li role="none"><button type="button" role="menuitem" tabindex="-1" data-view="unique-streets">Unique streets</button></li>
    <li role="none"><button type="button" role="menuitem" tabindex="-1" data-view="address">Address</button></li>
    <li role="none"><button type="button" role="menuitem" tabindex="-1" data-view="braille-labels">Braille Labels</button></li>
  </ul>
</div>

<h1>OSM Data Viewer</h1>

<form id="search-form">
  <label for="location-input">Location</label>
  <input type="text" id="location-input" name="location" required autocomplete="off">
  <button type="submit">Submit</button>
</form>

<h2>Results</h2>
<div id="results">
  <p id="matched-location"></p>
  <p id="status-message" aria-live="polite">No results. Please submit a location.</p>
  <ul id="street-list"></ul>
</div>

<footer>
  <h2>Footer</h2>
  <button type="button" id="copy-svg-btn">Copy SVG</button>
  <p id="copy-svg-status" aria-live="polite"></p>
  <p>End of page</p>
</footer>

<script src="app.js"></script>
</body>
</html>
